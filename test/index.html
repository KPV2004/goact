<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Goact Todo App Test</title>
    <script src="wasm_exec.js"></script>
    <script>
        // 2. Instantiate and run the WebAssembly binary
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
        });
    </script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
